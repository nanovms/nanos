name: Auto-close Claude PRs
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  close_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check Commit Message for Co-Authored-by
        id: check_msg
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q "Co-authored-by: Claude"; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Close PR
        if: steps.check_msg.outputs.match == 'true'
        uses: peter-evans/close-pull-request@v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          comment: 'Closing this Pull Request automatically because it contains AI co-author attribution.'
          delete-branch: true
